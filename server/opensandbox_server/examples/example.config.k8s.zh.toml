# Example Kubernetes Runtime Configuration for OpenSandbox Server
#
# This configuration file demonstrates how to configure the OpenSandbox server
# to use Kubernetes as the sandbox runtime.
#
# Usage:
#   1. Copy this file to ~/.sandbox.toml (or set SANDBOX_CONFIG_PATH environment variable)
#   2. Update the configuration values according to your environment
#   3. Start the server: uvicorn opensandbox_server.main:app --host 0.0.0.0 --port 8080

[server]
host = "0.0.0.0"
port = 8080
# api_key = "your-secret-api-key"  # 可选：取消注释以启用 API Key 认证

[log]
level = "INFO"
file_enabled = true  # 开启后日志写入文件（默认路径 ~/logs/opensandbox/）
# file_path = "~/logs/opensandbox/server.log"  # 可选：自定义 server.log 路径
# access_file_path = "~/logs/opensandbox/access.log"  # 可选：自定义 access.log 路径
# file_max_bytes = 104857600  # 100MB - 轮转前最大文件大小
# file_backup_count = 5       # 保留的轮转文件数量

# 🧪 [EXPERIMENTAL] 按访问续期。默认关闭 — 见 server/README_zh.md。
[renew_intent]
enabled = false
min_interval_seconds = 60
redis.enabled = false
# redis.dsn = "redis://127.0.0.1:6379/0"
redis.queue_key = "opensandbox:renew:intent"
redis.consumer_concurrency = 8

[runtime]
type = "kubernetes"
execd_image = "sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/execd:v1.0.12"

[storage]
# 卷存储配置
# -----------------------------------------------------------------
# 允许进行 bind mount 的宿主机路径前缀白名单。
# 仅匹配这些前缀的路径才能被挂载到沙箱中。
# 如果为空，则允许所有路径（不建议在生产环境使用）。
# 示例：allowed_host_paths = ["/data/opensandbox", "/tmp/sandbox"]
allowed_host_paths = []

# 自动创建 Kubernetes PVC 时的默认存储大小（当调用方未指定时使用）。
volume_default_size = "1Gi"

[kubernetes]
# Path to kubeconfig file. Leave as null to use in-cluster configuration
# Replace with your path
kubeconfig_path = "~/.kube/config"

# Namespace for sandbox workloads
namespace = "opensandbox"

# [Beta] 启用 informer 缓存以减少 API 调用。
# 如需关闭 watch 缓存，将该项设为 false。
informer_enabled = true
informer_resync_seconds = 300
informer_watch_timeout_seconds = 60

# Workload provider type: available providers are registered in the provider factory
# If not specified, uses the first registered provider (typically "batchsandbox")
workload_provider = "batchsandbox"

# Path to the BatchSandbox template file
# Replace with your path
batchsandbox_template_file = "~/batchsandbox-template.yaml"

[ingress]
# Ingress exposure mode: direct (default) or gateway
mode = "direct"

[egress]
# Egress configuration
# -----------------------------------------------------------------
image = "sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/egress:v1.0.7"
# Enforcement: "dns" (DNS proxy only) or "dns+nft" (nftables + DNS).
mode = "dns"
# Default is true (recommended for dual-stack CNI). Set false only if you need IPv6 in the netns (see server/configuration.md).
# disable_ipv6 = false
